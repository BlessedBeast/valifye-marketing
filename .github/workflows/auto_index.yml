name: Valifye Sentinel (Nightly Orchestrator & Auditor)

on:
  schedule:
    # Runs at 01:00 AM UTC (6:30 AM IST)
    - cron: '0 1 * * *'
  workflow_dispatch: 

jobs:
  sentinel_orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install google-auth google-api-python-client supabase python-dotenv requests

      - name: Create Service Account File
        run: |
          mkdir -p scripts
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > scripts/service-account.json

      # --- THE FOREMAN SEQUENCE ---
      - name: Phase 1 to 4 (Repair, Gate, Bridge, Sitemap)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🩹 PHASE 1: Repairing Slugs..."
          if [ -f "scripts/migrate_sloppy_slugs.py" ]; then python scripts/migrate_sloppy_slugs.py; fi

          echo "🛡️  PHASE 2: Quality Gates (Draft -> Live)..."
          if [ -f "scripts/publish_and_index.py" ]; then python scripts/publish_and_index.py; fi
          if [ -f "scripts/index_validation_reports.py" ]; then python scripts/index_validation_reports.py; fi
          if [ -f "scripts/index_seo_reports.py" ]; then python scripts/index_seo_reports.py; fi

          echo "🏗️  PHASE 3: Hub Synchronization..."
          if [ -f "scripts/generate_city_graphs.py" ]; then python scripts/generate_city_graphs.py; fi
          if [ -f "scripts/build_verdict_bridges.py" ]; then python scripts/build_verdict_bridges.py; fi
          if [ -f "scripts/local_bridges.py" ]; then python scripts/local_bridges.py; fi

          echo "📡 PHASE 4: Master Sitemap Generation..."
          if [ -f "generate_master_sitemap.py" ]; then python generate_master_sitemap.py; fi

      # --- PERFORM FINAL INTEGRITY AUDIT ---
      - name: Run Master Sitemap Audit
        id: sitemap_audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -f "check_sitemap.py" ]; then
            python check_sitemap.py > audit_output.txt
            cat audit_output.txt
            
            # Extract Metrics for Slack (Fixing the previous silent bug)
            # Sums up all numbers preceding the word "orphaned" or "Missing"
            echo "TOTAL_ORPHAN=$(grep -oP '\d+(?= orphaned| Missing from Sitemap)' audit_output.txt | awk '{s+=$1} END {if (s=="") print "0"; else print s}')" >> $GITHUB_ENV
            echo "TOTAL_ZOMBIE=$(grep -oP '\d+(?= Zombie Links)' audit_output.txt | awk '{s+=$1} END {if (s=="") print "0"; else print s}')" >> $GITHUB_ENV
          else
            echo "❌ check_sitemap.py NOT FOUND IN ROOT!"
            exit 1
          fi

      # --- NOTIFY SLACK ---
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TOTAL_ORPHAN: ${{ env.TOTAL_ORPHAN }}
          TOTAL_ZOMBIE: ${{ env.TOTAL_ZOMBIE }}
        run: |
          python - << 'PY'
          import os, requests
          
          def safe_int(val):
              try: return int(val) if val and val.strip() else 0
              except: return 0

          orphans = safe_int(os.getenv("TOTAL_ORPHAN"))
          zombies = safe_int(os.getenv("TOTAL_ZOMBIE"))
          
          issues = orphans + zombies
          color = "#36a64f" if issues == 0 else "#FF0000"
          status = "✅ SEO HEALTHY" if issues == 0 else "🚨 ACTION REQUIRED"
          
          payload = {
              "attachments": [{
                  "color": color,
                  "title": f"🛡️ Valifye Sentinel Audit: {status}",
                  "text": (
                      f"*Master Audit Summary (All Engines)*\n"
                      f"🛑 *Orphaned/Missing Pages:* `{orphans}`\n"
                      f"🧟 *Zombie/Dead Links:* `{zombies}`\n\n"
                      f"_Engines synced, Hubs bridged, and Sitemap generated._"
                  ),
                  "footer": "Valifye Automation Engine 2026",
                  "footer_icon": "https://valifye.com/favicon.ico"
              }]
          }
          
          webhook_url = os.getenv("SLACK_WEBHOOK_URL")
          if webhook_url:
              requests.post(webhook_url, json=payload)
          PY