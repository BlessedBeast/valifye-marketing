name: Nightly Forensic Indexer

on:
  schedule:
    # Runs at 01:00 AM UTC (approx 6:30 AM IST)
    - cron: '0 1 * * *'
  workflow_dispatch: 

jobs:
  index_new_pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install google-auth supabase python-dotenv requests pandas

      - name: Create Service Account File
        # Ensure the scripts directory exists before echo
        run: |
          mkdir -p scripts
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > scripts/service-account.json

      - name: Run Forensic Indexing Queue
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/index_queue.py

      - name: Run Sitemap Audit
        id: sitemap_audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python verify_sitemap.py > sitemap_audit.out
          cat sitemap_audit.out
          # Extraction logic
          echo "TOTAL_DB=$(grep '^TOTAL_DB=' sitemap_audit.out | cut -d '=' -f2 || echo '0')" >> $GITHUB_ENV
          echo "TOTAL_SITEMAP=$(grep '^TOTAL_SITEMAP=' sitemap_audit.out | cut -d '=' -f2 || echo '0')" >> $GITHUB_ENV
          echo "TOTAL_ORPHAN=$(grep '^ORPHAN_COUNT=' sitemap_audit.out | cut -d '=' -f2 || echo '0')" >> $GITHUB_ENV

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TOTAL_DB: ${{ env.TOTAL_DB }}
          TOTAL_SITEMAP: ${{ env.TOTAL_SITEMAP }}
          TOTAL_ORPHAN: ${{ env.TOTAL_ORPHAN }}
        run: |
          # Calculate Health and generate payload using a stable Python block
          python - << 'PY'
          import os, requests, json
          db = int(os.getenv("TOTAL_DB", 0))
          sm = int(os.getenv("TOTAL_SITEMAP", 0))
          orphans = os.getenv("TOTAL_ORPHAN", "0")
          health = f"{round((sm/db)*100)}%" if db > 0 else "0%"
          
          text = (
              f"🚀 *Valifye Forensic Audit Complete*\n"
              f"📈 DB Records: {db}\n"
              f"🗺️ Sitemap Health: {health}\n"
              f"🛑 Orphans: {orphans}\n"
              f"🔗 https://valifye.com/sitemap.xml"
          )
          
          webhook_url = os.getenv("SLACK_WEBHOOK_URL")
          if webhook_url:
              requests.post(webhook_url, json={"text": text})
          PY